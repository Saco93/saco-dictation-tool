[provider]
kind = "openai_compatible"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
model = "qwen3-asr-flash"
# Leave language unset to let the hosted provider auto-detect.
# For single-language testing you can set `language = "en"` or `language = "zh"`.
language_hints = ["zh", "en"]
prompt = ""
timeout_ms = 20000
max_retries = 2
# DashScope setup should skip the generic `/models` probe in this phase.
capability_probe = false
request_mode = "chat_completions"
# Prefer STTD_PROVIDER_API_KEY in sttd.env instead of storing secrets in TOML.
# api_key = "sk-your-dashscope-key"
# Deprecated compatibility alias still works, but prefer `api_key`.
# openrouter_api_key = "sk-your-dashscope-key"

# Local whisper settings stay here so you can switch back for baseline runs.
whisper_cmd = "whisper-cli"
whisper_model_path = "/usr/share/whisper.cpp/models/ggml-small.en-q5_1.bin"
# whisper_threads = 16
whisper_beam_size = 1
whisper_best_of = 1
whisper_no_fallback = true
whisper_no_timestamps = true

# Historical pre-change local Whisper baseline:
# 1. Set `kind = "whisper_local"`.
# 2. Comment out `language_hints` and `request_mode`.
# 3. Set `language = "en"`.
# 4. Keep the English-only `.en` model path above.

env_file_path = "${XDG_CONFIG_HOME:-~/.config}/sttd/sttd.env"

[audio]
# Leave empty to use the default input device.
# input_device = "alsa_input.pci-0000_00_1f.3.analog-stereo"
sample_rate_hz = 16000
channels = 1
frame_ms = 20
max_utterance_ms = 30000
max_payload_bytes = 1500000

[vad]
start_threshold_dbfs = -38.0
end_silence_ms = 700
min_speech_ms = 250
max_utterance_ms = 30000

[guardrails]
max_requests_per_minute = 30
max_continuous_minutes = 30
provider_error_cooldown_seconds = 10
# Set a per-request estimate so soft-spend tracking reflects hosted usage.
estimated_request_cost_usd = 0.0
# monthly_soft_spend_limit_usd = 20.0
allow_over_limit = false

[playback]
enabled = true
playerctl_cmd = "playerctl"
command_timeout_ms = 400
aggregate_timeout_ms = 1200

[injection]
# type | clipboard | clipboard_autopaste
output_mode = "type"
clipboard_autopaste = false
wtype_cmd = "wtype"
wl_copy_cmd = "wl-copy"

[debug_wav]
enabled = false
directory = "${XDG_CACHE_HOME:-~/.cache}/sttd/debug-wav"
ttl_hours = 24
size_cap_mb = 100

[ipc]
socket_path = "${XDG_RUNTIME_DIR}/sttd/sttd.sock"
socket_dir_mode = 448
socket_file_mode = 384

[privacy]
redact_transcript_in_logs = true
persist_transcripts = false
