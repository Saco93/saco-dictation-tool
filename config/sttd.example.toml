[provider]
kind = "whisper_local"
# For persistent local inference, switch to:
# kind = "whisper_server"
# base_url = "http://127.0.0.1:8080"
# For whisper_local this is ignored; keep this for openrouter fallback compatibility.
model = "openai/whisper-1"
language = "en"
prompt = ""
# Timeout for a single transcription request. Local whisper can take longer on larger models.
timeout_ms = 120000
max_retries = 2
# For openrouter only. Startup validation still runs locally.
capability_probe = false
whisper_cmd = "whisper-cli"
# Example Arch model path from whisper.cpp model packages.
whisper_model_path = "/usr/share/whisper.cpp/models/ggml-small.en-q5_1.bin"
# Optional; if omitted, whisper.cpp picks a default thread count.
# whisper_threads = 16
# Fast decode profile for dictation. Increase values for better quality but slower speed.
whisper_beam_size = 1
whisper_best_of = 1
whisper_no_fallback = true
whisper_no_timestamps = true
env_file_path = "${XDG_CONFIG_HOME:-~/.config}/sttd/sttd.env"

[audio]
# Leave empty to use default input device.
# input_device = "alsa_input.pci-0000_00_1f.3.analog-stereo"
sample_rate_hz = 16000
channels = 1
frame_ms = 20
max_utterance_ms = 30000
max_payload_bytes = 1500000

[vad]
start_threshold_dbfs = -38.0
end_silence_ms = 700
min_speech_ms = 250
max_utterance_ms = 30000

[guardrails]
max_requests_per_minute = 30
max_continuous_minutes = 30
provider_error_cooldown_seconds = 10
# Optional per-request estimate used for monthly soft-spend accounting.
estimated_request_cost_usd = 0.0
# Optional soft-limit. Set to a positive number to enable warnings/blocking.
# monthly_soft_spend_limit_usd = 20.0
allow_over_limit = false

[playback]
# Best-effort global playback control via playerctl + MPRIS.
# Recording snapshots currently-playing players at session start only.
enabled = true
playerctl_cmd = "playerctl"
# Per-command timeout for `playerctl -l`, `status`, `pause`, and `play`.
command_timeout_ms = 400
# Aggregate timeout budget for a full pause/resume pass across all players.
aggregate_timeout_ms = 1200

[injection]
# type | clipboard | clipboard_autopaste
output_mode = "type"
clipboard_autopaste = false
wtype_cmd = "wtype"
wl_copy_cmd = "wl-copy"

[debug_wav]
enabled = false
directory = "${XDG_CACHE_HOME:-~/.cache}/sttd/debug-wav"
ttl_hours = 24
size_cap_mb = 100

[ipc]
socket_path = "${XDG_RUNTIME_DIR}/sttd/sttd.sock"
socket_dir_mode = 448
socket_file_mode = 384

[privacy]
redact_transcript_in_logs = true
persist_transcripts = false
